name: 'Example for Linux'

on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Runner label'
        required: true
        default: '["ubuntu-latest","ubuntu-24.04-arm"]'
        type: string

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: ${{ fromJson(inputs.os) }}

    steps:
      - name: 'Start docker'
        shell: bash
        run: |
          sudo /etc/init.d/docker restart
      - name: 'Run task'
        shell: bash
        run: echo "Running arch=$(uname -m) runner_name=${{ runner.name }} on hostname=$(hostname)."
      - name: 'Run docker'
        shell: bash
        run: |
          newgrp docker
          docker run --rm alpine/curl -fsSL https://ifconfig.me
