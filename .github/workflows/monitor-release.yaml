name: 'Monitor release'

on:
  schedule:
    - cron: '17 */2 * * *'
      timezone: 'Europe/Bratislava'
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      actions: write

    steps:
      - name: 'Monitor release'
        uses: stefanbosak/gh-actions/monitor-release@main
        with:
          projects: |
            [
              {"owner":"actions","repo":"runner"},
              {"owner":"adoptium","repo":"temurin8-binaries"},
              {"owner":"adoptium","repo":"temurin21-binaries"},
              {"owner":"apache","repo":"ant","usetag": true},
              {"owner":"apache","repo":"groovy","usetag": true},
              {"owner":"apache","repo":"maven"},
              {"owner":"gradle","repo":"gradle"},
              {"owner":"JetBrains","repo":"kotlin"}
            ]
